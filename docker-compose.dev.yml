services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_container

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      sh -c "uv sync &&
      uv run uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload"

    environment:
      ENV: development
